name: Tests
on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: plugin-src
      - uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-fe-user
          path: vbwd-fe-user
          submodules: recursive
      - run: cp -r plugin-src/. vbwd-fe-user/plugins/toss-payments-payment/
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vbwd-fe-user/package-lock.json
      - run: cd vbwd-fe-user/vbwd-fe-core && npm install && npm run build
      - run: cd vbwd-fe-user && npm install
      - name: Run plugin tests
        run: |
          cd vbwd-fe-user
          if find plugins/toss-payments-payment -name "*.spec.ts" -o -name "*.test.ts" | grep -q .; then
            npx vitest run plugins/toss-payments-payment --reporter=verbose
          else
            echo "No tests — skipping"
          fi
